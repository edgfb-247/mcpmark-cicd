name: Test Minimal Workflow

on:
  issues:
    types: [opened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test github-script
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Testing github-script...');
            console.log('Context repo:', context.repo);
            console.log('Issue number:', context.payload.issue.number);
            
            // Try to create test-epic label
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'test-epic',
                color: '0052cc',
                description: 'Test epic label'
              });
              console.log('Test-epic label created');
            } catch (err) {
              if (err.status === 404) {
                console.log('Test-epic label already exists');
              } else {
                console.error('Error creating test-epic label:', err);
              }
            }
            
            // Try to add label to issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['test-epic']
            });
            console.log('Test-epic label added to issue');