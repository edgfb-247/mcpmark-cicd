name: Test Minimal Workflow

on:
  issues:
    types: [opened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test github-script
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Testing github-script...');
            console.log('Context repo:', context.repo);
            console.log('Issue number:', context.payload.issue.number);
            
            // Try to create epic label
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'epic',
                color: '0052cc',
                description: 'Large feature requiring multiple sub-tasks'
              });
              console.log('Epic label created');
            } catch (err) {
              if (err.status === 404) {
                console.log('Epic label already exists');
              } else {
                console.error('Error creating epic label:', err);
              }
            }
            
            // Try to add label to issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['epic']
            });
            console.log('Epic label added to issue');