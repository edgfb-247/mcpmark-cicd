on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Run issue triage and label management
        uses: actions/github-script@v6
        with:
          script: |
            const { issue } = context.payload;
            const github = context.github;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;

            // Define all required labels
            const requiredLabels = [
              // Category
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0056ff', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'f9d0c4', description: 'Maintenance and housekeeping tasks' },
              // Priority
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'd93f0b', description: 'High priority issue' },
              { name: 'priority-medium', color: 'fef2c0', description: 'Medium priority issue' },
              { name: 'priority-low', color: 'e6e6e6', description: 'Low priority issue' },
              // Status
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '0075ca', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '6e5494', description: 'Issue created by first-time contributor' }
            ];

            // Create labels if they don't exist
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  // Label doesn't exist, create it
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }

            // Add needs-triage label first
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-triage']
            });

            // Determine category label based on title
            const title = issue.title.toLowerCase();
            let categoryLabel = null;
            if (title.includes('bug')) {
              categoryLabel = 'bug';
            } else if (title.includes('epic')) {
              categoryLabel = 'epic';
            } else if (title.includes('maintenance')) {
              categoryLabel = 'maintenance';
            }

            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [categoryLabel]
              });
            }

            // Determine priority label based on title or body
            const content = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            let priorityLabel = 'priority-medium'; // default
            if (content.includes('critical') || content.includes('urgent') || content.includes('production') || content.includes('outage')) {
              priorityLabel = 'priority-critical';
            } else if (content.includes('important') || content.includes('high') || content.includes('blocking')) {
              priorityLabel = 'priority-high';
            } else if (content.includes('low') || content.includes('nice-to-have') || content.includes('minor')) {
              priorityLabel = 'priority-low';
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: [issue-triage]
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v6
        with:
          script: |
            const { issue } = context.payload;
            const github = context.github;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const parentNumber = issue.number;
            const parentTitle = issue.title;

            // Subtask details
            const subtasks = [
              { name: 'Requirements Analysis', number: 1 },
              { name: 'Design and Architecture', number: 2 },
              { name: 'Implementation', number: 3 },
              { name: 'Testing and Documentation', number: 4 }
            ];

            const subtaskNumbers = [];

            // Create each subtask
            for (const subtask of subtasks) {
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${subtask.number}: ${subtask.name}`;
              const subtaskBody = `Related to #${parentNumber}`;

              const response = await github.rest.issues.create({
                owner,
                repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });

              subtaskNumbers.push(response.data.number);
            }

            // Update parent issue body with checklist
            const checklist = `## Epic Tasks\n` +
              `- [ ] Task 1: Requirements Analysis (#${subtaskNumbers[0]})\n` +
              `- [ ] Task 2: Design and Architecture (#${subtaskNumbers[1]})\n` +
              `- [ ] Task 3: Implementation (#${subtaskNumbers[2]})\n` +
              `- [ ] Task 4: Testing and Documentation (#${subtaskNumbers[3]})`;

            const newBody = issue.body ? `${issue.body}\n\n${checklist}` : checklist;

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    if: always() # Run even if task-breakdown is skipped
    steps:
      - name: Run auto-response actions
        uses: actions/github-script@v6
        with:
          script: |
            const { issue } = context.payload;
            const github = context.github;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const author = issue.user.login;

            // Check if it's the author's first issue in this repo
            const issuesResponse = await github.rest.issues.listForRepo({
              owner,
              repo,
              author,
              state: 'all'
            });

            const isFirstIssue = issuesResponse.data.length === 1;

            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['first-time-contributor']
              });
            }

            // Determine comment content based on labels
            let commentBody = '';
            const labels = issue.labels.map(label => label.name.toLowerCase());
            if (labels.includes('bug')) {
              commentBody = 'Thank you for reporting this bug! Please review our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to ensure we have all the information needed to address this issue.';
            } else if (labels.includes('epic')) {
              commentBody = 'Thank you for submitting this epic! Please review our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) as we work through this large feature.';
            } else if (labels.includes('maintenance')) {
              commentBody = 'Thank you for submitting this maintenance task! Please review our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) for more details on our maintenance process.';
            }

            // Post comment if commentBody is not empty
            if (commentBody) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: commentBody
              });
            }

            // Set milestone for high or critical priority
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Get milestone by title
              const milestonesResponse = await github.rest.issues.listMilestones({
                owner,
                repo,
                state: 'open'
              });

              const milestone = milestonesResponse.data.find(m => m.title === 'v1.0.0');

              if (milestone) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  milestone: milestone.number
                });
              }
            }

            // Update status: remove needs-triage, add needs-review
            await github.rest.issues.removeLabel({
              owner,
              repo,
              issue_number: issueNumber,
              name: 'needs-triage'
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['needs-review']
            });